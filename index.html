<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUTEB_OS | INITIALIZING...</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-void: #020205;
            --matrix-green: #00ff41;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background-color: var(--dark-void);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', 'Cairo', monospace;
            overflow: hidden;
            height: 100vh;
            perspective: 1000px;
        }

        /* Canvas Background for Particles */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Main Interface */
        .interface {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .terminal-window {
            width: 90%;
            max-width: 800px;
            background: rgba(0, 20, 30, 0.7);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            padding: 30px;
            position: relative;
            backdrop-filter: blur(10px);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
        }

        .system-status {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 0.7rem;
            color: var(--neon-purple);
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .glitch-title {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px var(--neon-purple);
        }

        .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            left: 2px;
            text-shadow: -2px 0 red;
            top: 0;
            color: white;
            background: var(--dark-void);
            overflow: hidden;
            clip: rect(0, 900px, 0, 0);
            animation: noise-anim 2s infinite linear alternate-reverse;
        }

        @keyframes noise-anim {
            0% { clip: rect(10px, 9999px, 50px, 0); }
            20% { clip: rect(80px, 9999px, 100px, 0); }
            40% { clip: rect(30px, 9999px, 60px, 0); }
            100% { clip: rect(90px, 9999px, 120px, 0); }
        }

        .decrypt-text {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--neon-cyan);
            min-height: 1.5em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 10px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 243, 255, 0.05);
        }

        .stat-label { color: var(--neon-purple); }

        .hex-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            background-image: radial-gradient(var(--neon-cyan) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        .action-button {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 5px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .action-button:hover {
            background: var(--neon-cyan);
            color: var(--dark-void);
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        .loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 1s;
        }

        .loader.hidden { opacity: 0; pointer-events: none; }

        #radar {
            width: 150px;
            height: 150px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            position: relative;
            margin-bottom: 20px;
        }

        #radar::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 50%; height: 2px;
            background: var(--neon-cyan);
            transform-origin: left;
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .glitch-title { font-size: 1.8rem; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="loader" id="loader">
        <div id="radar"></div>
        <div id="loading-text">ACCESSING SECURE SERVER...</div>
    </div>

    <canvas id="canvas"></canvas>
    
    <div class="interface">
        <div class="terminal-window">
            <div class="system-status">● SYSTEM: ACTIVE</div>
            <div class="hex-bg"></div>
            
            <h1 class="glitch-title" data-text="متعب العتيبي">متعب العتيبي</h1>
            
            <div class="decrypt-text" id="bio">
                INITIALIZING BIO_DATA...
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-label">[ROLE]</span>
                    <span>TECH_RESEARCHER</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">[SKILL_01]</span>
                    <span>VULN_DISCOVERY</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">[SKILL_02]</span>
                    <span>SYS_ARCHITECT</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">[SKILL_03]</span>
                    <span>NET_ENGINEER</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">[STATUS]</span>
                    <span style="color: var(--matrix-green);">ENCRYPTED</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">[LOC]</span>
                    <span>SAUDI_ARABIA</span>
                </div>
            </div>

            <button class="action-button" onclick="window.open('https://www.linkedin.com/in/muteb-al-otaibi-9641853bb', '_blank')">
                ESTABLISH_CONNECTION
            </button>
        </div>
    </div>

    <script>
        // Particle Background
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = '#00f3ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        init();
        animate();

        // Decrypt Effect
        const originalText = "شغوف بعالم التقنية، متخصص في شبكات الحاسب مع اهتمام عميق باكتشاف الثغرات وتأمين البيانات. أتميز بمهارات البحث وحل المشكلات التقنية.";
        const bioElement = document.getElementById('bio');
        let iteration = 0;

        function decrypt() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
            const interval = setInterval(() => {
                bioElement.innerText = originalText
                    .split("")
                    .map((letter, index) => {
                        if (index < iteration) return originalText[index];
                        return letters[Math.floor(Math.random() * 40)];
                    })
                    .join("");

                if (iteration >= originalText.length) clearInterval(interval);
                iteration += 1 / 3;
            }, 30);
        }

        // Loader
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                setTimeout(decrypt, 500);
            }, 2000);
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
