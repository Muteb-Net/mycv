<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUTEB | THE_ULTIMATE_INTERFACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --cosmic-purple: #6e00ff;
            --cosmic-blue: #00d2ff;
            --cosmic-pink: #ff00ff;
            --void-black: #020205;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--void-black);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
        }

        /* Animated Nebula Background */
        #nebula-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(50px);
            opacity: 0.6;
        }

        /* Starfield */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }

        /* The Quantum Card */
        .quantum-card {
            position: relative;
            width: 90%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 80px 50px;
            transform-style: preserve-3d;
            box-shadow: 0 0 100px rgba(110, 0, 255, 0.2);
            overflow: hidden;
            transition: transform 0.1s ease-out;
        }

        .quantum-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--cosmic-purple), var(--cosmic-blue), transparent);
            animation: rotateGlow 10s linear infinite;
            z-index: -1;
            opacity: 0.2;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Header Content */
        .header {
            text-align: center;
            margin-bottom: 60px;
            transform: translateZ(50px);
        }

        .avatar-portal {
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            position: relative;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--cosmic-purple), var(--cosmic-blue));
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px var(--cosmic-purple);
        }

        .avatar-portal i {
            font-size: 5rem;
            color: #fff;
            filter: drop-shadow(0 0 20px #fff);
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--cosmic-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.4rem;
            color: var(--cosmic-blue);
            letter-spacing: 5px;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* Content Sections */
        .content-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            transform: translateZ(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 2;
            font-size: 1.2rem;
            text-align: center;
        }

        /* Skills Mosaic */
        .skills-mosaic {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 60px;
            transform: translateZ(40px);
        }

        .mosaic-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        .mosaic-item:hover {
            background: rgba(110, 0, 255, 0.2);
            border-color: var(--cosmic-blue);
            transform: translateY(-10px) scale(1.05);
        }

        .mosaic-item i {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: var(--cosmic-blue);
        }

        .mosaic-item span {
            display: block;
            font-weight: 700;
            font-size: 0.95rem;
        }

        /* Ultimate Button */
        .btn-ultimate {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: #fff;
            color: #000;
            padding: 20px 60px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            transition: 0.4s;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            transform: translateZ(60px);
        }

        .btn-ultimate:hover {
            transform: translateZ(80px) scale(1.1);
            background: var(--cosmic-blue);
            color: #fff;
            box-shadow: 0 0 60px var(--cosmic-blue);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .skills-mosaic { grid-template-columns: 1fr; }
            .quantum-card { padding: 50px 25px; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    <canvas id="nebula-canvas"></canvas>

    <div class="quantum-card" id="card">
        <div class="header">
            <div class="avatar-portal">
                <i class="fas fa-atom"></i>
            </div>
            <h1>متعب العتيبي</h1>
            <div class="subtitle">محب للتقنية & باحث</div>
        </div>

        <div class="content-box">
            شغوف بعالم التقنية منذ البداية، متخصص في شبكات الحاسب مع اهتمام عميق باكتشاف الثغرات وتأمين البيانات. أتميز بمهارات البحث وحل المشكلات التقنية.
        </div>

        <div class="skills-mosaic">
            <div class="mosaic-item">
                <i class="fas fa-eye"></i>
                <span>اكتشاف الثغرات</span>
            </div>
            <div class="mosaic-item">
                <i class="fas fa-bolt"></i>
                <span>حل المشكلات</span>
            </div>
            <div class="mosaic-item">
                <i class="fas fa-microchip"></i>
                <span>التعامل مع الأنظمة</span>
            </div>
            <div class="mosaic-item">
                <i class="fas fa-user-shield"></i>
                <span>حماية البيانات</span>
            </div>
            <div class="mosaic-item">
                <i class="fas fa-network-wired"></i>
                <span>أساسيات الشبكات</span>
            </div>
            <div class="mosaic-item">
                <i class="fas fa-infinity"></i>
                <span>البحث والتعلم الذاتي</span>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="https://www.linkedin.com/in/muteb-al-otaibi-9641853bb" target="_blank" class="btn-ultimate">
                <span>تواصل معي عبر LinkedIn</span>
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>
    </div>

    <script>
        // Nebula Background Animation
        const canvas = document.getElementById('nebula-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let colors = ['#6e00ff', '#00d2ff', '#ff00ff'];
        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 100 + 50;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.velocity = { x: (Math.random() - 0.5) * 2, y: (Math.random() - 0.5) * 2 };
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                if (this.x < 0 || this.x > canvas.width) this.velocity.x *= -1;
                if (this.y < 0 || this.y > canvas.height) this.velocity.y *= -1;
                this.draw();
            }
        }

        for (let i = 0; i < 15; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.update());
            requestAnimationFrame(animate);
        }
        animate();

        // 3D Card Tilt Effect
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 30;
            const y = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
