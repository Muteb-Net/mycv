<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السيرة الذاتية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --bg: #0b0f19;
            --card: #161b22;
            --text: #ffffff;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        /* خلفية جمالية خفيفة */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--card);
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .welcome-tag {
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 { 
            margin: 0; 
            font-weight: 900; 
            font-size: 2.5rem; 
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { color: #94a3b8; font-size: 1.1rem; margin-top: 10px; font-weight: 400; }

        .bio { 
            line-height: 1.8; 
            color: #8b949e; 
            margin: 30px 0; 
            font-size: 0.95rem; 
        }

        .skills-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 40px; 
        }

        .skill-card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px; 
            border-radius: 12px; 
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .skill-card:hover { background: rgba(0, 210, 255, 0.05); border-color: var(--primary); }

        .linkedin-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1rem;
            transition: 0.3s;
        }

        .linkedin-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(255,255,255,0.1); 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-tag">PORTFOLIO</div>
    
    <h1>متعب العتيبي</h1>
    <div class="tagline">هاوي تقنية & مهتم بالأمن السيبراني</div>
    
    <p class="bio">
        متخصص في إدارة وتخصيص أنظمة Linux، أعمل على تطوير الحلول التقنية وأتمتة المهام البرمجية. شغوف باستكشاف تقنيات الأمن السيبراني وبناء بيئات عمل آمنة وفعالة.
    </p>

    <div class="skills-grid">
        <div class="skill-card">Linux</div>
        <div class="skill-card">Bash Scripting</div>
        <div class="skill-card">Python Tools</div>
        <div class="skill-card">Cyber Security</div>
    </div>

    <a href="https://www.linkedin.com/in/muteb-al-otaibi-9641853bb/" class="linkedin-btn">
        تواصل معي عبر LinkedIn
    </a>
</div>

</body>
</html>
